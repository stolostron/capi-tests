name: 03 Cluster Preparation

# Manual-only trigger. Requires Azure secrets configured in repository settings:
#   AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  ARO_REPO_URL: https://github.com/marek-veber/cluster-api-installer.git
  ARO_REPO_BRANCH: capi-tests
  ARO_REPO_DIR: /tmp/cluster-api-installer-aro
  USE_KIND: "true"
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

jobs:
  test-kind:
    name: Cluster Preparation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Validate Azure secrets
      run: |
        missing=""
        [ -z "$AZURE_TENANT_ID" ] && missing="$missing AZURE_TENANT_ID"
        [ -z "$AZURE_SUBSCRIPTION_ID" ] && missing="$missing AZURE_SUBSCRIPTION_ID"
        [ -z "$AZURE_CLIENT_ID" ] && missing="$missing AZURE_CLIENT_ID"
        [ -z "$AZURE_CLIENT_SECRET" ] && missing="$missing AZURE_CLIENT_SECRET"
        if [ -n "$missing" ]; then
          echo "::error::Missing required repository secrets:$missing"
          echo "Configure these in Settings > Secrets and variables > Actions"
          exit 1
        fi
        echo "All required Azure secrets are configured"

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install dependencies
      run: go mod download

    # Tool versions - keep in sync with README.md Prerequisites
    - name: Install Kind
      run: |
        KIND_VERSION=v0.31.0
        KIND_BIN=kind-linux-amd64
        curl -fsSLo "./${KIND_BIN}" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BIN}"
        curl -fsSLo "./${KIND_BIN}.sha256sum" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BIN}.sha256sum"
        sha256sum --check "./${KIND_BIN}.sha256sum"
        chmod +x "./${KIND_BIN}"
        sudo mv "./${KIND_BIN}" /usr/local/bin/kind
        kind version

    - name: Install kubectl
      run: |
        # kubectl - uses latest stable (compatible with Kubernetes 1.28+)
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client

    - name: Install Helm
      uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      with:
        # Helm 3.12+ required
        version: 'v3.16.0'

    - name: Run Kind cluster tests
      uses: ./.github/actions/run-go-tests
      with:
        test-run: TestKindCluster
        test-timeout: '30m'
        summary-title: Kind Cluster Preparation Results
        annotation-file: test/03_cluster_test.go
        artifact-name: test-results-kind-cluster
