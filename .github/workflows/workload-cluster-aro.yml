name: Full Cluster Deployment (ARO)

# Full end-to-end cluster deployment workflow (management cluster + workload cluster).
# This workflow deploys a Kind management cluster and provisions an ARO HCP workload cluster.
#
# Triggers:
#   - Nightly at 2:00 AM UTC (cancelled/grey if no code changes since last successful run)
#   - Manual dispatch
#
# Requires:
#   - Environment (aro-stage) with:
#     - Variables: AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID, REGION, DEPLOYMENT_ENV
#     - Secret: AZURE_CLIENT_SECRET
#   - Repository secret: QUAY_AUTH
#
# Compare with management-cluster-aro.yml:
#   - management-cluster-aro.yml: Quick validation, Kind + controllers only (no workload cluster)
#   - cluster-aro.yml (this file): Full deployment including workload cluster provisioning
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        default: 'aro-stage'
        options:
          - aro-int
          - aro-stage
      cluster_mode:
        description: 'Management cluster mode'
        required: true
        type: choice
        default: 'kind'
        options:
          - kind
          - mce

permissions:
  contents: read
  issues: write

env:
  INFRA_PROVIDER: aro
  ARO_REPO_URL: https://github.com/marek-veber/cluster-api-installer.git
  ARO_REPO_BRANCH: capi-tests
  ARO_REPO_DIR: /tmp/cluster-api-installer-aro
  TEST_TIMEOUT_MINUTES: 120
  # Global variables (not environment-specific)
  QUAY_AUTH: ${{ secrets.QUAY_AUTH }}
  CAPI_USER: mv2

jobs:
  check-changes:
    name: Check for code changes
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    if: github.event_name != 'schedule' || true
    outputs:
      has_changes: ${{ github.event_name != 'schedule' || steps.check.outputs.has_changes == 'true' }}
    steps:
    - name: Check for changes since last successful run
      id: check
      if: github.event_name == 'schedule'
      env:
        GH_TOKEN: ${{ github.token }}
        WORKFLOW_FILE: workload-cluster-aro.yml
        REPO: ${{ github.repository }}
      run: |
        LAST_SUCCESS_SHA=$(gh run list \
          --workflow "$WORKFLOW_FILE" \
          --repo "$REPO" \
          --status success \
          --json headSha \
          --jq '.[0].headSha // empty' 2>/dev/null || true)

        if [ -z "$LAST_SUCCESS_SHA" ]; then
          echo "No previous successful run found — running workflow"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        CURRENT_SHA="${{ github.sha }}"
        if [ "$LAST_SUCCESS_SHA" = "$CURRENT_SHA" ]; then
          echo "No new commits since last successful run ($LAST_SUCCESS_SHA)"
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "New commits detected: $LAST_SUCCESS_SHA..$CURRENT_SHA"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Cancel workflow if no changes
      if: github.event_name == 'schedule' && steps.check.outputs.has_changes == 'false'
      env:
        GH_TOKEN: ${{ github.token }}
        RUN_ID: ${{ github.run_id }}
        REPO: ${{ github.repository }}
      run: |
        echo "No code changes detected — cancelling workflow run"
        gh run cancel "$RUN_ID" --repo "$REPO"
        sleep 5

  management-cluster:
    name: Full Cluster (${{ inputs.cluster_mode || 'kind' }} → ARO)
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 2x TEST_TIMEOUT_MINUTES (120m * 2)
    environment: ${{ inputs.environment || 'aro-stage' }}
    env:
      # Cluster mode selection
      CLUSTER_MODE: ${{ inputs.cluster_mode || 'kind' }}

      # Environment-specific Azure credentials and config
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      REGION: ${{ vars.REGION }}
      DEPLOYMENT_ENV: ${{ vars.DEPLOYMENT_ENV }}

      # MCE credentials (only required when cluster_mode=mce)
      MCE_API_URL: ${{ vars.MCE_API_URL }}
      MCE_API_USER: ${{ vars.MCE_API_USER }}
      MCE_API_PASSWORD: ${{ secrets.MCE_API_PASSWORD }}

    steps:
    - name: Validate credentials
      id: secrets
      run: |
        CONFIGURED=true
        missing=""

        # Repository secrets (always required)
        [ -z "$QUAY_AUTH" ] && missing="$missing QUAY_AUTH"
        if [ -n "$missing" ]; then
          echo "::warning::Missing required repository secrets:$missing"
          echo "Configure these in Settings > Secrets and variables > Actions"
          CONFIGURED=false
        fi

        # Azure credentials (always required)
        missing=""
        [ -z "$AZURE_TENANT_ID" ] && missing="$missing vars.AZURE_TENANT_ID"
        [ -z "$AZURE_SUBSCRIPTION_ID" ] && missing="$missing vars.AZURE_SUBSCRIPTION_ID"
        [ -z "$AZURE_CLIENT_ID" ] && missing="$missing vars.AZURE_CLIENT_ID"
        [ -z "$AZURE_CLIENT_SECRET" ] && missing="$missing secrets.AZURE_CLIENT_SECRET"
        [ -z "$REGION" ] && missing="$missing vars.REGION"
        [ -z "$DEPLOYMENT_ENV" ] && missing="$missing vars.DEPLOYMENT_ENV"
        if [ -n "$missing" ]; then
          echo "::warning::Missing required environment configuration:$missing"
          echo "Configure in Settings > Environments > ${{ inputs.environment }}"
          CONFIGURED=false
        fi

        # MCE credentials (only required when CLUSTER_MODE=mce)
        if [ "$CLUSTER_MODE" = "mce" ]; then
          missing=""
          [ -z "$MCE_API_URL" ] && missing="$missing vars.MCE_API_URL"
          [ -z "$MCE_API_PASSWORD" ] && missing="$missing secrets.MCE_API_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::MCE mode selected but missing credentials:$missing"
            echo "Configure in Settings > Environments > ${{ inputs.environment }}"
            CONFIGURED=false
          fi
        fi

        if [ "$CONFIGURED" = "false" ] ; then
          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::error::Missing required credentials - workflow cannot continue"
          exit 1
        fi

        echo "All required credentials and variables are configured"
        echo "configured=true" >> "$GITHUB_OUTPUT"

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libxml2-utils
        go mod download

    - name: Install OpenShift CLI and kubectl
      run: |
        rm -f openshift-client-linux.tar.gz sha256sum.txt
        wget -q https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
        wget -q https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/sha256sum.txt
        grep 'openshift-client-linux.tar.gz$' sha256sum.txt | sha256sum -c -
        tar -xzf openshift-client-linux.tar.gz
        # Install both oc and kubectl from OpenShift client (same version, avoids conflicts)
        sudo mv oc /usr/local/bin/
        sudo mv kubectl /usr/local/bin/
        sudo chmod +x /usr/local/bin/oc
        sudo chmod +x /usr/local/bin/kubectl
        oc version --client
        kubectl version --client

    - name: Verify Azure CLI
      run: az version

    # Tool versions - keep in sync with README.md Prerequisites
    # Kind installation - only when CLUSTER_MODE=kind
    - name: Install Kind
      if: env.CLUSTER_MODE == 'kind'
      run: |
        KIND_VERSION=v0.31.0
        KIND_BIN=kind-linux-amd64
        curl -fsSLo "./${KIND_BIN}" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BIN}"
        curl -fsSLo "./${KIND_BIN}.sha256sum" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BIN}.sha256sum"
        sha256sum --check "./${KIND_BIN}.sha256sum"
        chmod +x "./${KIND_BIN}"
        sudo mv "./${KIND_BIN}" /usr/local/bin/kind
        kind version

    - name: Install clusterctl
      run: |
        # Note: cluster-api does not publish checksums/signatures for clusterctl binaries
        # (upstream issues #9292, #9293). Verification only available for container images.
        CLUSTERCTL_VERSION=v1.12.2
        curl -fsSL "https://github.com/kubernetes-sigs/cluster-api/releases/download/${CLUSTERCTL_VERSION}/clusterctl-linux-amd64" -o clusterctl
        chmod +x clusterctl
        sudo mv clusterctl /usr/local/bin/
        clusterctl version

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        # Helm 3.12+ required
        version: 'v3.16.0'

    - name: 'Setup Docker pull secrets for Kind'
      if: env.CLUSTER_MODE == 'kind'
      run: |
        # Create secure temporary directory for Docker config
        DOCKER_SECRETS=$(mktemp -d)

        # Set restrictive umask for file creation
        umask 077

        # Create config.json with registry credentials
        # This will be mounted into Kind nodes at /var/lib/kubelet/config.json
        cat > "${DOCKER_SECRETS}/config.json" <<EOF
        {
          "auths": {
            "quay.io": {
              "auth": "${QUAY_AUTH}"
            }
          }
        }
        EOF

        echo "Docker config created at ${DOCKER_SECRETS}/config.json"

        # Export DOCKER_SECRETS for subsequent steps
        echo "DOCKER_SECRETS=${DOCKER_SECRETS}" >> $GITHUB_ENV

    - name: 'Run test-all'
      # Azure credentials and config are set at job level (see env: above)
      # DEPLOY_CRS_TIMEOUT has a 10m buffer over DEPLOYMENT_TIMEOUT so the deployment
      # loop can produce a graceful t.Fatalf before Go's test timer panics.
      env:
        DEPLOYMENT_TIMEOUT: "${{ env.TEST_TIMEOUT_MINUTES }}m"
        DEPLOY_CRS_TIMEOUT: "${{ fromJSON(env.TEST_TIMEOUT_MINUTES) + 10 }}m"
        DELETION_TIMEOUT: "${{ env.TEST_TIMEOUT_MINUTES }}m"
      run: make test-all
      continue-on-error: true
      id: phase3

    - name: Generate test summary
      if: always()
      run: |
        python3 - << 'PYEOF'
        import xml.etree.ElementTree as ET
        import glob, os, sys

        phase_names = {
            "check-dep": "Check Dependencies",
            "setup": "Repository Setup",
            "cluster": "Kind Cluster",
            "generate-yamls": "Generate YAMLs",
            "deploy-apply": "CR Deployment (Apply)",
            "deploy-monitor": "CR Deployment (Monitor)",
            "deploy-crs": "Deploy CRs",
            "verify": "Verification",
            "delete": "Deletion",
        }

        files = sorted(glob.glob("results/latest/junit-*.xml"))
        if not files:
            summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
            with open(summary_path, "a") as s:
                s.write("# Full Cluster (ARO) Results\n\n")
                s.write("No test results found\n")
            sys.exit(0)

        total = passed = failed = skipped = 0
        summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

        with open(summary_path, "a") as summary:
            summary.write("# Full Cluster (ARO) Results\n\n")

            for f in files:
                phase_key = os.path.basename(f).replace("junit-", "").replace(".xml", "")
                phase_label = phase_names.get(phase_key, phase_key)

                try:
                    tree = ET.parse(f)
                except ET.ParseError:
                    summary.write(f"## {phase_label}\n\nFailed to parse results\n\n")
                    continue

                summary.write(f"## {phase_label}\n\n")
                summary.write("| Test | Status | Duration |\n")
                summary.write("|------|--------|----------|\n")

                for tc in tree.iter("testcase"):
                    name = tc.get("name", "")
                    time_val = tc.get("time", "0")
                    if tc.find("failure") is not None or tc.find("error") is not None:
                        status = "❌ FAIL"
                        failed += 1
                    elif tc.find("skipped") is not None:
                        status = "⏭️ SKIP"
                        skipped += 1
                    else:
                        status = "✅ PASS"
                        passed += 1
                    total += 1
                    summary.write(f"| {name} | {status} | {time_val}s |\n")

                summary.write("\n")

            summary.write("## Summary\n")
            summary.write(f"- **Total Tests:** {total}\n")
            summary.write(f"- **Passed:** ✅ {passed}\n")
            summary.write(f"- **Failed:** ❌ {failed}\n")
            summary.write(f"- **Skipped:** ⏭️ {skipped}\n")
        PYEOF

    - name: Create test annotations
      if: always()
      run: |
        python3 - << 'PYEOF'
        import xml.etree.ElementTree as ET
        import glob, os

        file_map = {
            "junit-check-dep.xml": "test/01_check_dependencies_test.go",
            "junit-setup.xml": "test/02_setup_test.go",
            "junit-cluster.xml": "test/03_cluster_test.go",
            "junit-generate-yamls.xml": "test/04_generate_yamls_test.go",
            "junit-deploy-apply.xml": "test/05_deploy_crs_test.go",
            "junit-deploy-monitor.xml": "test/05_deploy_crs_test.go",
            "junit-deploy-crs.xml": "test/05_deploy_crs_test.go",
            "junit-verify.xml": "test/06_verification_test.go",
            "junit-delete.xml": "test/07_deletion_test.go",
        }

        for xml_path in sorted(glob.glob("results/latest/junit-*.xml")):
            base = os.path.basename(xml_path)
            test_file = file_map.get(base)
            if not test_file:
                continue

            try:
                tree = ET.parse(xml_path)
            except ET.ParseError:
                continue

            for tc in tree.iter("testcase"):
                if tc.find("failure") is not None or tc.find("error") is not None:
                    name = tc.get("name", "")
                    print(f"::error file={test_file},title=Test Failed::{name} failed")
        PYEOF

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-results-full-cluster-aro
        path: results/
        retention-days: 30

    - name: Create GitHub issue on failure
      if: always() && steps.secrets.outputs.configured == 'true' && (steps.phase3.outcome == 'failure')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WORKFLOW_NAME: Full Cluster (ARO)
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REF_NAME: ${{ github.ref_name }}
        COMMIT_SHA: ${{ github.sha }}
        EVENT_NAME: ${{ github.event_name }}
        PHASE3_OUTCOME: ${{ steps.phase3.outcome }}
      run: |
        EXISTING_ISSUE=$(gh issue list --label "automated" --label "test-failure" --state open --json number,title --jq ".[] | select(.title | contains(\"[$WORKFLOW_NAME]\")) | .number | select(. != null)" | head -1)

        if [ -n "$EXISTING_ISSUE" ]; then
          echo "Issue already exists: #$EXISTING_ISSUE"
          gh issue comment "$EXISTING_ISSUE" --body "Workflow failed again in run: $RUN_URL"
        else
          FAILED_TESTS=$(python3 -c "
        import xml.etree.ElementTree as ET
        import glob
        for f in sorted(glob.glob('results/latest/junit-*.xml')):
            try:
                tree = ET.parse(f)
                for tc in tree.iter('testcase'):
                    if tc.find('failure') is not None or tc.find('error') is not None:
                        print(tc.get('name', ''))
            except Exception:
                pass
        " 2>/dev/null)

          cat > issue_body.md << EOF
        ## $WORKFLOW_NAME Workflow Failed

        **Run URL:** $RUN_URL
        **Branch:** $REF_NAME
        **Commit:** $COMMIT_SHA
        **Triggered by:** $EVENT_NAME

        ### Phase Results
        - All tests: $PHASE3_OUTCOME

        ### Failed Tests
        EOF

          if [ -n "$FAILED_TESTS" ]; then
            echo '```' >> issue_body.md
            echo "$FAILED_TESTS" >> issue_body.md
            echo '```' >> issue_body.md
          else
            echo "No detailed test results available" >> issue_body.md
          fi

          echo "" >> issue_body.md
          echo "---" >> issue_body.md
          echo "*This issue was automatically created by the CI workflow*" >> issue_body.md

          # Ensure labels exist (gh issue create fails if label is missing)
          gh label create "automated" --force 2>/dev/null || true
          gh label create "test-failure" --color "d93f0b" --force 2>/dev/null || true

          gh issue create \
            --title "[$WORKFLOW_NAME] Workflow failed on $REF_NAME" \
            --body-file issue_body.md \
            --label "automated" \
            --label "test-failure"
        fi

    - name: Fail if any phase failed
      if: always()
      env:
        PHASE3_OUTCOME: ${{ steps.phase3.outcome }}
      run: |
        EXIT=0
        if [ "$PHASE3_OUTCOME" = "failure" ]; then
          echo "Test suite (test-all) failed"
          EXIT=1
        elif [ -z "$PHASE3_OUTCOME" ] || [ "$PHASE3_OUTCOME" = "skipped" ]; then
          echo "Test suite (test-all) was skipped"
          EXIT=1
        fi
        exit $EXIT

    - name: 'Cleanup resources'
      if: always()
      run: |
        # Authenticate Azure CLI for resource cleanup using SP credentials
        if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_CLIENT_SECRET" ] && [ -n "$AZURE_TENANT_ID" ]; then
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none && echo "Azure CLI authenticated for cleanup" \
            || echo "Warning: Azure CLI login failed, Azure resource cleanup may be incomplete"
          if [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
            az account set --subscription "$AZURE_SUBSCRIPTION_ID" || true
          fi
        fi
        FORCE=1 make clean-all
      continue-on-error: true
