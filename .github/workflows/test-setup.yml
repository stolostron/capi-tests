name: 02 Test Setup

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  test-setup:
    name: Repository Setup
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run setup tests
      uses: ./.github/actions/run-go-tests
      id: test-run
      with:
        test-run: TestSetup
        test-timeout: '10m'
        summary-title: Test Repository Setup Results
        annotation-file: test/02_setup_test.go
        artifact-name: test-results-setup

    - name: Create GitHub issue on failure
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Check if there's already an open issue for this workflow
        WORKFLOW_NAME="Test Repository Setup"
        EXISTING_ISSUE=$(gh issue list --label "automated" --label "test-failure" --state open --json number,title --jq ".[] | select(.title | contains(\"[$WORKFLOW_NAME]\")) | .number | select(. != null)" | head -1)

        if [ -n "$EXISTING_ISSUE" ]; then
          echo "Issue already exists: #$EXISTING_ISSUE"
          gh issue comment $EXISTING_ISSUE --body "Workflow failed again in run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        else
          # Extract failed tests from JSON
          FAILED_TESTS=""
          if [ -f test-results/tests.json ]; then
            FAILED_TESTS=$(jq -r 'select(.Test != null and .Action == "fail") | .Test' test-results/tests.json | head -5)
          fi

          # Create issue body
          cat > issue_body.md << EOF
        ## Test Repository Setup Workflow Failed

        **Run URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        **Branch:** ${{ github.ref_name }}
        **Commit:** ${{ github.sha }}
        **Triggered by:** ${{ github.event_name }}

        ### Failed Tests
        EOF

          if [ -n "$FAILED_TESTS" ]; then
            echo '```' >> issue_body.md
            echo "$FAILED_TESTS" >> issue_body.md
            echo '```' >> issue_body.md
          else
            echo "No test results available" >> issue_body.md
          fi

          echo "" >> issue_body.md
          echo "---" >> issue_body.md
          echo "*This issue was automatically created by the CI workflow*" >> issue_body.md

          # Ensure labels exist (gh issue create fails if label is missing)
          gh label create "automated" --force 2>/dev/null || true
          gh label create "test-failure" --color "d93f0b" --force 2>/dev/null || true

          # Create the issue
          gh issue create \
            --title "[$WORKFLOW_NAME] Workflow failed on ${{ github.ref_name }}" \
            --body-file issue_body.md \
            --label "automated" \
            --label "test-failure"
        fi
