name: Management Cluster (ARO)

# Management cluster deployment only (no workload cluster provisioning).
# This workflow deploys a Kind cluster with CAPI/CAPZ/ASO controllers and validates setup.
# Does NOT provision ARO HCP workload clusters.
#
# Triggers:
#   - Pull requests (pre-merge validation)
#   - Push to main (post-merge validation)
#   - Manual dispatch
#
# Requires:
#   - Repository secret: QUAY_AUTH
#
# Compare with cluster-aro.yml:
#   - management-cluster-aro.yml (this file): Quick validation, Kind + controllers only
#   - cluster-aro.yml: Full deployment including ARO HCP workload cluster provisioning
on:
  pull_request:
    branches: [main]
    paths:
      - 'test/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/management-cluster-aro.yml'
  push:
    branches: [main]
    paths:
      - 'test/**'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/management-cluster-aro.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  INFRA_PROVIDER: aro
  ARO_REPO_URL: https://github.com/marek-veber/cluster-api-installer.git
  ARO_REPO_BRANCH: capi-tests
  ARO_REPO_DIR: /tmp/cluster-api-installer-aro
  USE_KIND: "true"
  QUAY_AUTH: ${{ secrets.QUAY_AUTH }}

jobs:
  management-cluster:
    name: Management Cluster (ARO/CAPZ)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Validate credentials
      id: secrets
      run: |
        CONFIGURED=true
        missing=""
        [ -z "$QUAY_AUTH" ] && missing="$missing QUAY_AUTH"
        if [ -n "$missing" ]; then
          echo "::warning::Missing required repository secrets:$missing"
          echo "Configure these in Settings > Secrets and variables > Actions"
          CONFIGURED=false
        fi
        if [ "$CONFIGURED" = "false" ] ; then
          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::error::Missing required credentials - workflow cannot continue"
          exit 1
        fi
        echo "All required credentials and variables are configured"
        echo "configured=true" >> "$GITHUB_OUTPUT"

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libxml2-utils
        go mod download

    - name: Install OpenShift CLI
      run: |
        rm -f openshift-client-linux.tar.gz sha256sum.txt
        wget -q https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
        wget -q https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/sha256sum.txt
        grep 'openshift-client-linux.tar.gz$' sha256sum.txt | sha256sum -c -
        tar -xzf openshift-client-linux.tar.gz
        sudo mv oc /usr/local/bin/
        sudo chmod +x /usr/local/bin/oc
        oc version --client

    - name: Verify Azure CLI
      run: az version

    # Tool versions - keep in sync with README.md Prerequisites
    - name: Install Kind
      run: |
        KIND_VERSION=v0.31.0
        KIND_BIN=kind-linux-amd64
        curl -fsSLo "./${KIND_BIN}" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BIN}"
        curl -fsSLo "./${KIND_BIN}.sha256sum" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/${KIND_BIN}.sha256sum"
        sha256sum --check "./${KIND_BIN}.sha256sum"
        chmod +x "./${KIND_BIN}"
        sudo mv "./${KIND_BIN}" /usr/local/bin/kind
        kind version

    - name: Install kubectl
      run: |
        # kubectl - uses latest stable (compatible with Kubernetes 1.28+)
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client

    - name: Install Helm
      uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      with:
        # Helm 3.12+ required
        version: 'v3.16.0'

    - name: 'Phase 1: Check Dependencies'
      run: make _check-dep
      continue-on-error: true
      id: phase1

    - name: 'Phase 2: Repository Setup'
      if: steps.phase1.outcome == 'success'
      run: make _setup
      continue-on-error: true
      id: phase2

    - name: 'Setup Docker pull secrets for Kind'
      if: steps.phase2.outcome == 'success'
      run: |
        # Create secure temporary directory for Docker config
        DOCKER_SECRETS=$(mktemp -d)

        # Set restrictive umask for file creation
        umask 077

        # Create config.json with registry credentials
        # This will be mounted into Kind nodes at /var/lib/kubelet/config.json
        cat > "${DOCKER_SECRETS}/config.json" <<EOF
        {
          "auths": {
            "quay.io": {
              "auth": "${QUAY_AUTH}"
            }
          }
        }
        EOF

        echo "Docker config created at ${DOCKER_SECRETS}/config.json"

        # Export DOCKER_SECRETS for subsequent steps
        echo "DOCKER_SECRETS=${DOCKER_SECRETS}" >> $GITHUB_ENV

    - name: 'Phase 3: Kind Cluster'
      if: steps.phase2.outcome == 'success'
      run: make _management_cluster
      continue-on-error: true
      id: phase3

    - name: Generate test summary
      if: always()
      run: |
        python3 - << 'PYEOF'
        import xml.etree.ElementTree as ET
        import glob, os, sys

        phase_names = {
            "check-dep": "Check Dependencies",
            "setup": "Repository Setup",
            "cluster": "Kind Cluster",
        }

        files = sorted(glob.glob("results/latest/junit-*.xml"))
        if not files:
            summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
            with open(summary_path, "a") as s:
                s.write("# Management Cluster (ARO) Results\n\n")
                s.write("No test results found\n")
            sys.exit(0)

        total = passed = failed = skipped = 0
        summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

        with open(summary_path, "a") as summary:
            summary.write("# Management Cluster (ARO) Results\n\n")

            for f in files:
                phase_key = os.path.basename(f).replace("junit-", "").replace(".xml", "")
                phase_label = phase_names.get(phase_key, phase_key)

                try:
                    tree = ET.parse(f)
                except ET.ParseError:
                    summary.write(f"## {phase_label}\n\nFailed to parse results\n\n")
                    continue

                summary.write(f"## {phase_label}\n\n")
                summary.write("| Test | Status | Duration |\n")
                summary.write("|------|--------|----------|\n")

                for tc in tree.iter("testcase"):
                    name = tc.get("name", "")
                    time_val = tc.get("time", "0")
                    if tc.find("failure") is not None or tc.find("error") is not None:
                        status = "❌ FAIL"
                        failed += 1
                    elif tc.find("skipped") is not None:
                        status = "⏭️ SKIP"
                        skipped += 1
                    else:
                        status = "✅ PASS"
                        passed += 1
                    total += 1
                    summary.write(f"| {name} | {status} | {time_val}s |\n")

                summary.write("\n")

            summary.write("## Summary\n")
            summary.write(f"- **Total Tests:** {total}\n")
            summary.write(f"- **Passed:** ✅ {passed}\n")
            summary.write(f"- **Failed:** ❌ {failed}\n")
            summary.write(f"- **Skipped:** ⏭️ {skipped}\n")
        PYEOF

    - name: Create test annotations
      if: always()
      run: |
        python3 - << 'PYEOF'
        import xml.etree.ElementTree as ET
        import glob, os

        file_map = {
            "junit-check-dep.xml": "test/01_check_dependencies_test.go",
            "junit-setup.xml": "test/02_setup_test.go",
            "junit-cluster.xml": "test/03_cluster_test.go",
        }

        for xml_path in sorted(glob.glob("results/latest/junit-*.xml")):
            base = os.path.basename(xml_path)
            test_file = file_map.get(base)
            if not test_file:
                continue

            try:
                tree = ET.parse(xml_path)
            except ET.ParseError:
                continue

            for tc in tree.iter("testcase"):
                if tc.find("failure") is not None or tc.find("error") is not None:
                    name = tc.get("name", "")
                    print(f"::error file={test_file},title=Test Failed::{name} failed")
        PYEOF

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-results-management-cluster-aro
        path: results/
        retention-days: 30

    - name: Create GitHub issue on failure
      if: always() && steps.secrets.outputs.configured == 'true' && (steps.phase1.outcome == 'failure' || steps.phase2.outcome == 'failure' || steps.phase3.outcome == 'failure')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WORKFLOW_NAME: Management Cluster (ARO)
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REF_NAME: ${{ github.ref_name }}
        COMMIT_SHA: ${{ github.sha }}
        EVENT_NAME: ${{ github.event_name }}
        PHASE1_OUTCOME: ${{ steps.phase1.outcome }}
        PHASE2_OUTCOME: ${{ steps.phase2.outcome }}
        PHASE3_OUTCOME: ${{ steps.phase3.outcome }}
      run: |
        EXISTING_ISSUE=$(gh issue list --label "automated" --label "test-failure" --state open --json number,title --jq ".[] | select(.title | contains(\"[$WORKFLOW_NAME]\")) | .number | select(. != null)" | head -1)

        if [ -n "$EXISTING_ISSUE" ]; then
          echo "Issue already exists: #$EXISTING_ISSUE"
          gh issue comment "$EXISTING_ISSUE" --body "Workflow failed again in run: $RUN_URL"
        else
          FAILED_TESTS=$(python3 -c "
        import xml.etree.ElementTree as ET
        import glob
        for f in sorted(glob.glob('results/latest/junit-*.xml')):
            try:
                tree = ET.parse(f)
                for tc in tree.iter('testcase'):
                    if tc.find('failure') is not None or tc.find('error') is not None:
                        print(tc.get('name', ''))
            except Exception:
                pass
        " 2>/dev/null)

          cat > issue_body.md << EOF
        ## $WORKFLOW_NAME Workflow Failed

        **Run URL:** $RUN_URL
        **Branch:** $REF_NAME
        **Commit:** $COMMIT_SHA
        **Triggered by:** $EVENT_NAME

        ### Phase Results
        - Phase 1 (Check Dependencies): $PHASE1_OUTCOME
        - Phase 2 (Repository Setup): $PHASE2_OUTCOME
        - Phase 3 (Kind Cluster): $PHASE3_OUTCOME

        ### Failed Tests
        EOF

          if [ -n "$FAILED_TESTS" ]; then
            echo '```' >> issue_body.md
            echo "$FAILED_TESTS" >> issue_body.md
            echo '```' >> issue_body.md
          else
            echo "No detailed test results available" >> issue_body.md
          fi

          echo "" >> issue_body.md
          echo "---" >> issue_body.md
          echo "*This issue was automatically created by the CI workflow*" >> issue_body.md

          gh issue create \
            --title "[$WORKFLOW_NAME] Workflow failed on $REF_NAME" \
            --body-file issue_body.md \
            --label "automated" \
            --label "test-failure"
        fi

    - name: Fail if any phase failed
      if: always()
      env:
        PHASE1_OUTCOME: ${{ steps.phase1.outcome }}
        PHASE2_OUTCOME: ${{ steps.phase2.outcome }}
        PHASE3_OUTCOME: ${{ steps.phase3.outcome }}
      run: |
        EXIT=0
        if [ "$PHASE1_OUTCOME" = "failure" ]; then
          echo "Phase 1 (Check Dependencies) failed"
          EXIT=1
        fi
        if [ "$PHASE2_OUTCOME" = "failure" ]; then
          echo "Phase 2 (Repository Setup) failed"
          EXIT=1
        elif [ -z "$PHASE2_OUTCOME" ] || [ "$PHASE2_OUTCOME" = "skipped" ]; then
          echo "Phase 2 (Repository Setup) was skipped (Phase 1 failed)"
          EXIT=1
        fi
        if [ "$PHASE3_OUTCOME" = "failure" ]; then
          echo "Phase 3 (Kind Cluster) failed"
          EXIT=1
        elif [ -z "$PHASE3_OUTCOME" ] || [ "$PHASE3_OUTCOME" = "skipped" ]; then
          echo "Phase 3 (Kind Cluster) was skipped (earlier phase failed)"
          EXIT=1
        fi
        exit $EXIT
