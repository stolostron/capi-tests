ref:
  as: capz-test-teardown
  from: src
  commands: capz-test-teardown-commands.sh
  best_effort: true
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 30m
  documentation: |-
    Teardown safety net for CAPZ test suite. Always runs as a post step,
    even if test steps fail. Cleans up Kind cluster, cloned repository,
    kubeconfig files, and Azure resources. Does not affect Prow artifacts.
