ref:
  as: capz-test-management-cluster
  from: src
  commands: capz-test-management-cluster-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 45m
  documentation: |-
    Validates the IPI-provisioned cluster with pre-installed CAPI/CAPZ/ASO
    controllers. Controllers are installed by the capz-test-install-controllers step.
